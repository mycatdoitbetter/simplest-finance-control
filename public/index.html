<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-2xl font-semibold text-slate-800 mb-6">Finance Control</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
        <p class="text-sm text-emerald-700">Income</p>
        <p id="summary-income" class="text-xl font-semibold text-emerald-800">R$ 0,00</p>
      </div>
      <div class="bg-rose-50 border border-rose-200 rounded-lg p-4">
        <p class="text-sm text-rose-700">Expenses</p>
        <p id="summary-expense" class="text-xl font-semibold text-rose-800">R$ 0,00</p>
      </div>
      <div class="bg-slate-50 border border-slate-200 rounded-lg p-4">
        <p class="text-sm text-slate-700">Balance</p>
        <p id="summary-balance" class="text-xl font-semibold text-slate-800">R$ 0,00</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-2">
        <div class="bg-white rounded-lg shadow p-4">
          <h2 class="font-medium text-slate-700 mb-4">Transactions</h2>
          <div class="flex gap-4 mb-4">
            <select id="filter-month" class="rounded border border-slate-300 px-3 py-1.5 text-sm">
              <option value="">All months</option>
              <option value="01">Jan</option>
              <option value="02">Feb</option>
              <option value="03">Mar</option>
              <option value="04">Apr</option>
              <option value="05">May</option>
              <option value="06">Jun</option>
              <option value="07">Jul</option>
              <option value="08">Aug</option>
              <option value="09">Sep</option>
              <option value="10">Oct</option>
              <option value="11">Nov</option>
              <option value="12">Dec</option>
            </select>
            <select id="filter-year" class="rounded border border-slate-300 px-3 py-1.5 text-sm"></select>
          </div>
          <form id="form-transaction" class="flex flex-wrap gap-2 mb-4">
            <input type="date" id="input-date" required class="rounded border border-slate-300 px-3 py-1.5 text-sm">
            <select id="input-type" required class="rounded border border-slate-300 px-3 py-1.5 text-sm">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select id="input-category" required class="rounded border border-slate-300 px-3 py-1.5 text-sm min-w-[140px]"></select>
            <input type="number" id="input-amount" step="0.01" placeholder="Amount" required class="rounded border border-slate-300 px-3 py-1.5 text-sm w-24">
            <input type="text" id="input-notes" placeholder="Notes" class="rounded border border-slate-300 px-3 py-1.5 text-sm flex-1 min-w-[100px]">
            <button type="submit" class="bg-slate-700 text-white px-4 py-1.5 rounded text-sm hover:bg-slate-600">Add</button>
          </form>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-200 text-left text-slate-600">
                  <th class="py-2">Date</th>
                  <th class="py-2">Type</th>
                  <th class="py-2">Category</th>
                  <th class="py-2 text-right">Amount</th>
                  <th class="py-2">Notes</th>
                  <th class="py-2 w-10"></th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-lg shadow p-4 h-fit">
        <h2 class="font-medium text-slate-700 mb-4">Expense by Category</h2>
        <canvas id="chart-expenses" height="280"></canvas>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/table.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
