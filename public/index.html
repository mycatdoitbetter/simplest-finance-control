<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-[1400px] mx-auto p-6">
    <h1 class="text-2xl font-semibold text-slate-800 mb-6">Finance Control</h1>

    <details class="mb-8">
      <summary class="cursor-pointer font-medium text-slate-700 hover:text-slate-900">Categories</summary>
      <div class="mt-4 bg-white rounded-lg shadow p-4">
        <form id="form-category" class="flex flex-wrap items-end gap-4 mb-4">
          <input type="hidden" id="category-type">
          <input type="hidden" id="category-id">
          <div>
            <label class="block text-xs text-slate-600 mb-1">Tipo</label>
            <div class="flex gap-1">
              <button type="button" data-type="income" class="type-badge px-3 py-1.5 rounded text-sm border border-slate-300 bg-slate-50 text-slate-600 hover:bg-slate-100">Income</button>
              <button type="button" data-type="expense" class="type-badge px-3 py-1.5 rounded text-sm border border-slate-300 bg-slate-50 text-slate-600 hover:bg-slate-100">Expense</button>
            </div>
          </div>
          <div>
            <label for="category-name" class="block text-xs text-slate-600 mb-1">Nome</label>
            <input type="text" id="category-name" placeholder="Nome da categoria" required class="rounded border border-slate-300 px-3 py-1.5 text-sm w-48">
          </div>
          <div class="flex gap-2">
            <button type="submit" id="category-submit" class="bg-slate-700 text-white px-4 py-1.5 rounded text-sm hover:bg-slate-600">Add</button>
            <button type="button" id="category-cancel" class="hidden border border-slate-300 px-4 py-1.5 rounded text-sm hover:bg-slate-50 ml-2">Cancel</button>
          </div>
        </form>
        <div class="flex items-center gap-4 mb-2">
          <button type="button" id="bulk-delete-categories" class="hidden text-sm text-rose-600 hover:text-rose-700">Delete selected</button>
        </div>
        <div class="overflow-x-auto -mx-4 px-4">
          <table class="w-full text-sm min-w-[400px]">
            <thead>
              <tr class="border-b border-slate-200 text-left text-slate-600">
                <th class="py-2 w-8"><input type="checkbox" id="select-all-categories" class="rounded"></th>
                <th class="py-2">Name</th>
                <th class="py-2">Type</th>
                <th class="py-2 w-24"></th>
              </tr>
            </thead>
            <tbody id="categories-body"></tbody>
          </table>
        </div>
      </div>
    </details>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
        <p class="text-sm text-emerald-700">Income</p>
        <p id="summary-income" class="text-xl font-semibold text-emerald-800">R$ 0,00</p>
      </div>
      <div class="bg-rose-50 border border-rose-200 rounded-lg p-4">
        <p class="text-sm text-rose-700">Expenses</p>
        <p id="summary-expense" class="text-xl font-semibold text-rose-800">R$ 0,00</p>
      </div>
      <div class="bg-slate-50 border border-slate-200 rounded-lg p-4">
        <p class="text-sm text-slate-700">Balance</p>
        <p id="summary-balance" class="text-xl font-semibold text-slate-800">R$ 0,00</p>
      </div>
    </div>

    <div class="mb-8">
      <div class="bg-white rounded-lg shadow p-4">
        <h2 class="font-medium text-slate-700 mb-4">Transactions</h2>
          <div id="month-tabs" class="flex flex-wrap gap-1 mb-4 overflow-x-auto"></div>
          <form id="form-transaction" class="space-y-4 mb-4">
            <input type="hidden" id="transaction-id">
            <input type="hidden" id="input-type">
            <div class="flex flex-wrap gap-6 items-end">
              <div>
                <label class="block text-xs text-slate-600 mb-1">Tipo</label>
                <div class="flex gap-1">
                  <button type="button" data-type="income" class="txn-type-badge px-3 py-1.5 rounded text-sm border border-slate-300 bg-slate-50 text-slate-600 hover:bg-slate-100">Income</button>
                  <button type="button" data-type="expense" class="txn-type-badge px-3 py-1.5 rounded text-sm border border-slate-300 bg-slate-50 text-slate-600 hover:bg-slate-100">Expense</button>
                </div>
              </div>
              <div>
                <label for="input-date" class="block text-xs text-slate-600 mb-1">Data</label>
                <input type="text" id="input-date" placeholder="dd/mm/aaaa" required maxlength="10" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-28">
              </div>
              <div>
                <label for="input-category" class="block text-xs text-slate-600 mb-1">Categoria</label>
                <select id="input-category" required class="rounded border border-slate-300 px-3 py-1.5 text-sm w-40 min-w-0"></select>
              </div>
              <div>
                <label for="input-amount" class="block text-xs text-slate-600 mb-1">Valor</label>
                <input type="number" id="input-amount" step="0.01" required class="rounded border border-slate-300 px-3 py-1.5 text-sm w-28">
              </div>
              <div id="recurrence-wrap">
                <label for="input-recurrence" class="block text-xs text-slate-600 mb-1">Repetir (meses)</label>
                <input type="number" id="input-recurrence" min="1" max="24" value="1" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-20">
              </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div>
                <label for="input-due-date" class="block text-xs text-slate-600 mb-1">Vencimento</label>
                <input type="text" id="input-due-date" placeholder="dd/mm/aaaa" maxlength="10" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-full">
              </div>
              <div>
                <label for="input-planned-payment" class="block text-xs text-slate-600 mb-1">Pag. planejado</label>
                <input type="text" id="input-planned-payment" placeholder="dd/mm/aaaa" maxlength="10" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-full">
              </div>
              <div>
                <label for="input-pix-key" class="block text-xs text-slate-600 mb-1">Chave PIX</label>
                <input type="text" id="input-pix-key" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-full">
              </div>
              <div>
                <label for="input-barcode" class="block text-xs text-slate-600 mb-1">Cod. boleto</label>
                <input type="text" id="input-barcode" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-full">
              </div>
            </div>
            <div class="flex flex-wrap gap-4 items-end">
              <div class="flex-1 min-w-[200px]">
                <label for="input-notes" class="block text-xs text-slate-600 mb-1">Notas</label>
                <input type="text" id="input-notes" class="rounded border border-slate-300 px-3 py-1.5 text-sm w-full">
              </div>
              <div class="flex items-end gap-2">
                <div>
                  <label for="input-attachment" class="block text-xs text-slate-600 mb-1">PDF</label>
                  <div class="flex items-center gap-2">
                    <label class="cursor-pointer rounded border border-slate-300 px-3 py-1.5 text-sm bg-slate-50 hover:bg-slate-100 text-slate-700">
                      <input type="file" id="input-attachment" accept="application/pdf" class="hidden">
                      Anexar
                    </label>
                    <span id="attachment-name" class="text-xs text-slate-500 hidden"></span>
                    <button type="button" id="remove-attachment" class="hidden text-xs text-rose-600 hover:text-rose-700">Remover</button>
                  </div>
                </div>
                <button type="submit" id="transaction-submit" class="bg-slate-700 text-white px-4 py-1.5 rounded text-sm hover:bg-slate-600">Add</button>
                <button type="button" id="transaction-cancel" class="hidden border border-slate-300 px-4 py-1.5 rounded text-sm hover:bg-slate-50">Cancel</button>
              </div>
            </div>
          </form>
          <div class="flex items-center gap-4 mb-2">
            <button type="button" id="bulk-delete-transactions" class="hidden text-sm text-rose-600 hover:text-rose-700">Delete selected</button>
          </div>
          <div class="overflow-x-auto -mx-4 px-4">
            <table class="w-full text-sm min-w-[900px]">
              <thead>
                <tr class="border-b border-slate-200 text-left text-slate-600">
                  <th class="py-2 w-8"><input type="checkbox" id="select-all-transactions" class="rounded"></th>
                  <th class="py-2 whitespace-nowrap">Data</th>
                  <th class="py-2">Tipo</th>
                  <th class="py-2">Categoria</th>
                  <th class="py-2">Valor</th>
                  <th class="py-2 whitespace-nowrap">Vencimento</th>
                  <th class="py-2 whitespace-nowrap">Chave PIX</th>
                  <th class="py-2 whitespace-nowrap">Cod. boleto</th>
                  <th class="py-2 whitespace-nowrap">Pag. planejado</th>
                  <th class="py-2">Notas</th>
                  <th class="py-2 w-16">PDF</th>
                  <th class="py-2 w-20"></th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
    </div>

    <section class="mb-8">
      <h2 class="font-medium text-slate-700 mb-4">Charts</h2>
      <div class="bg-white rounded-lg shadow p-4 max-w-md">
        <h3 class="text-sm font-medium text-slate-600 mb-4">Expense by Category</h3>
        <canvas id="chart-expenses" height="200"></canvas>
      </div>
    </section>
  </div>
  <script src="js/api.js"></script>
  <script src="js/table.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
